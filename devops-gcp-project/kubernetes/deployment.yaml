apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: devops
spec:
  replicas: 2

  selector:
    matchLabels:
      app: nodejs-app

  template:
    metadata:
      labels:
        app: nodejs-app

    spec:
      containers:
      - name: nodejs-app

        image: asia-south1-docker.pkg.dev/devops-gke-project-496810/docker-repo/nodejs-app:latest

        ports:
        - containerPort: 3000